<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Conversor</title>
</head>

<body>
    <main>
        <h1>Prrr... Sistema Felino de Conversão</h1>
        <p id="paragraph">Nós, gatinhos, adoramos brincar convertendo números decimais em binário! 🐾</p>

        <div id="container-layout">
            <img src="https://png.pngtree.com/png-vector/20250909/ourmid/pngtree-cute-cartoon-cat-student-holding-pencil-and-notebook-adorable-kawaii-illustration-png-image_17395072.webp"
                alt="Gatinho com lápis olhando para a tela" />

            <div id="container-duo">
                <div id="choose-number">
                    <p>Digite um número natural e vamos explorar!</p>
                    <form id="form">
                        <input id="input-placeholder" placeholder="Ex: 19" />
                        <button>Converter</button>
                    </form>
                </div>

                <div id="result">
                    <p>Resultado:</p>

                    <div id="under-result">
                        <p id="result-output">🐾</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
